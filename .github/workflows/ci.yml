name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout component
        uses: actions/checkout@v4
        with:
          path: components/time

      - name: Checkout act-sdk-rs
        uses: actions/checkout@v4
        with:
          repository: actcore/act-sdk-rs
          path: act-sdk-rs

      - name: Checkout act-wit
        uses: actions/checkout@v4
        with:
          repository: actcore/act-wit
          path: act-wit

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/time/target
          key: ${{ runner.os }}-cargo-time-${{ hashFiles('components/time/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-time-

      - name: Cargo check
        working-directory: components/time
        run: cargo check

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout component
        uses: actions/checkout@v4
        with:
          path: components/time

      - name: Checkout act-sdk-rs
        uses: actions/checkout@v4
        with:
          repository: actcore/act-sdk-rs
          path: act-sdk-rs

      - name: Checkout act-wit
        uses: actions/checkout@v4
        with:
          repository: actcore/act-wit
          path: act-wit

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/time/target
          key: ${{ runner.os }}-cargo-time-${{ hashFiles('components/time/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-time-

      - name: Build WASM component
        working-directory: components/time
        run: cargo build --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: component_time.wasm
          path: components/time/target/wasm32-wasip2/release/*.wasm

  e2e:
    name: E2E Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout component
        uses: actions/checkout@v4
        with:
          path: components/time

      - name: Checkout act-sdk-rs
        uses: actions/checkout@v4
        with:
          repository: actcore/act-sdk-rs
          path: act-sdk-rs

      - name: Checkout act-wit
        uses: actions/checkout@v4
        with:
          repository: actcore/act-wit
          path: act-wit

      - name: Checkout act-host
        uses: actions/checkout@v4
        with:
          repository: actcore/act-host
          path: act-host

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-wasip2

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            components/time/target
            act-host/target
          key: ${{ runner.os }}-e2e-time-${{ hashFiles('components/time/Cargo.lock', 'act-host/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-e2e-time-

      - name: Build WASM component
        working-directory: components/time
        run: cargo build --release

      - name: Build act-host
        working-directory: act-host
        run: cargo build --release

      - name: Run e2e test
        run: |
          WASM=$(ls components/time/target/wasm32-wasip2/release/*.wasm | head -1)
          HOST=act-host/target/release/act-host

          echo "=== Testing get_current_time ==="
          OUTPUT=$($HOST call "$WASM" get_current_time --args '{}')
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qE '[0-9]{4}-[0-9]{2}-[0-9]{2}' || (echo "FAIL: expected datetime string" && exit 1)
          echo "PASS"
